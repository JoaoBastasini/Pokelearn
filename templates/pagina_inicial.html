<section>
  {% extends "cabecalho.html" %}
  <!---->
  {% block title %}Pokélearn{%endblock %}
  <!---->
  {% block content %}
  <!-- 
    Transforma o texto em uma imgagem, para estilização de forma
    Imagem .svg distorcida, faz o arco no título para familiaridade com a logo da franquia 
    -->
  <svg class="svg_centralizado" width="400" height="150" viewBox="0 0 450 200">
    <defs>
      <path id="img_curvada" d="M 10,180 Q 225,20 440,180" />
    </defs>

    <!-- Faz com que todas as letras caibam na imagem, sem cortar as pontas -->
    <text class="img_titulo">
      <textPath
        href="#img_curvada"
        startOffset="50%"
        textLength="440"
        lengthAdjust="spacingAndGlyphs"
      >
        POKÉLEARN
      </textPath>
    </text>
  </svg>

  <img
    class="img_centralizada"
    src="{{ url_for('static', filename='imagens/pokeball-pokemon-svgrepo-com.svg') }}"
    alt="Pokébola"
    style="width: 800px; height: 300px"
  />
  <div class="menu_principal">
    <h3>Aprenda matemática de forma divertida!</h3>
    <a href="{{ url_for('calculo_dano_page') }}" class="botao_minijogo"
      >Calcular Dano!</a
    >
    <a href="{{ url_for('calculo_xp_page') }}" class="botao_minijogo"
      >Calcular XP!</a
    >
    <a href="{{ url_for('calculo_prob_page') }}" class="botao_minijogo"
      >Chance de Captura!</a
    >
    <a href="{{ url_for('calculo_prob_event_page') }}" class="botao_minijogo"
      >Probabilidade de Eventos!</a
    >
    <a href="{{ url_for('calculo_logic_page') }}" class="botao_minijogo"
      >Qual meu tipo?</a
    >
  </div>
</section>
{% endblock %}
